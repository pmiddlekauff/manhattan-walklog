        // If it's our specific layer, toggle the legend!
        if (labelText.includes('Color Coded')) {
            var legend = document.getElementById('maplegend');
            if (legend) {
                legend.style.display = e.target.checked ? 'block' : 'none';
            }
        }
    }
});
